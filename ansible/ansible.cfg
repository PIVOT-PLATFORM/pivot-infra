[defaults]
# Directory, not a single file — merges inventory/recette.ini + inventory/prod.ini into one
# inventory (each defines its own group: [recette] / [prod]). Target one via
# `ansible-playbook playbook.yml -e target_env=recette` (or `prod`).
inventory = inventory/
host_key_checking = True
retry_files_enabled = False
vault_password_file = .vault_pass

[ssh_connection]
pipelining = True
