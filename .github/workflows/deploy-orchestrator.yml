name: Deploy orchestrator

# Central deploy authority for the managed-min Cloud Run stack (single env, no LB).
# Each service repo builds + pushes an immutable digest to Artifact Registry
# (keyless WIF) then fires a repository_dispatch here with {service, image,
# digest, version}. This workflow owns the Cloud Run rollout: it updates the
# EXISTING service (created/configured by Terraform in environments/recette-managed
# — env, secrets, VPC, probes, scaling) to the released digest, then smoke-tests
# through the public edge. First-ever creation of each service is done by
# `terraform apply` (with the AR image); this only swaps the image afterwards.
#
# Auth is keyless (Workload Identity Federation): no SA keys.
# Repo/org VARIABLES (not secrets):
#   vars.WIF_PROVIDER    = <iam_wif provider_name>
#   vars.ORCHESTRATOR_SA = dep-orchestrator@pivot-project-501905.iam.gserviceaccount.com
#   vars.GCP_PROJECT     = pivot-project-501905
#   vars.GCP_REGION      = europe-west1
#   vars.RECETTE_BASE_URL = https://<edge pivot-ui *.run.app URL>   (set after first apply)

on:
  repository_dispatch:
    types: [deploy-service]
  workflow_dispatch:
    inputs:
      service:
        description: Cloud Run service name (e.g. pivot-core)
        required: true
      image:
        description: "Fully-qualified image WITHOUT digest (…/pivot/<service>)"
        required: true
      digest:
        description: "sha256:… digest to deploy"
        required: true
      version:
        description: Release version (for the revision suffix / audit)
        required: true

permissions: read-all

concurrency:
  group: deploy-${{ github.event.client_payload.service || inputs.service }}
  cancel-in-progress: false

env:
  SERVICE: ${{ github.event.client_payload.service || inputs.service }}
  IMAGE:   ${{ github.event.client_payload.image || inputs.image }}
  DIGEST:  ${{ github.event.client_payload.digest || inputs.digest }}
  VERSION: ${{ github.event.client_payload.version || inputs.version }}

jobs:
  # -----------------------------------------------------------------------
  # Deploy the released digest to the (Terraform-created) Cloud Run service,
  # then smoke-test readiness through the public edge. Single env — no prod
  # gate/canary (managed-min is one environment served on *.run.app).
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy ${{ github.event.client_payload.service || inputs.service }} to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # WIF
    steps:
      - name: Authenticate to GCP (keyless / WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.ORCHESTRATOR_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Deploy revision by digest
        run: |
          gcloud run services update "${SERVICE}" \
            --project="${{ vars.GCP_PROJECT }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="${IMAGE}@${DIGEST}" \
            --revision-suffix="v-${VERSION//./-}" \
            --quiet

      - name: Smoke test (readiness via the edge)
        if: vars.RECETTE_BASE_URL != ''
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ vars.RECETTE_BASE_URL }}/api/actuator/health/readiness"; then
              echo "edge healthy"; exit 0
            fi
            echo "attempt $i not ready yet"; sleep 6
          done
          echo "::error::readiness never went green"; exit 1
